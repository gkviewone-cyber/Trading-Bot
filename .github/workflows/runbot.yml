name: Market Scanner (Every 5 Min)

on:
  schedule:
    # Every 5 min, 9:15 AM to 3:30 PM IST (UTC+5:30)
    # 9:15 AM IST = 3:45 UTC → use 3-10 UTC window
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 3  # Kill if takes longer than 3 min (should finish in <30s)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install NorenRestApiPy pyotp requests pytz

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SHOONYA_USER:       ${{ secrets.SHOONYA_USER }}
          SHOONYA_PWD:        ${{ secrets.SHOONYA_PWD }}
          SHOONYA_VC:         ${{ secrets.SHOONYA_VC }}
          SHOONYA_APIKEY:     ${{ secrets.SHOONYA_APIKEY }}
          SHOONYA_TOTP:       ${{ secrets.SHOONYA_TOTP }}
          RENDER_URL:         ${{ secrets.RENDER_URL }}
        run: python scanner.py
