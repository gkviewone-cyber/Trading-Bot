name: Telegram Trading Bot

on:
  schedule:
    - cron: "*/5 4-10 * * 1-5"
  workflow_dispatch:

jobs:
  run-bot:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install libraries
      run: |
        pip install yfinance pandas ta requests pytz

    - name: Run bot
      run: python telegram_bot.py
