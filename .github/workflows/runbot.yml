name: Run Trading Bot Every 5 Minutes

on:
  workflow_dispatch:

  schedule:
    # 9:15 AM – 9:59 AM IST
    - cron: "15-59/5 3 * * 1-5"

    # 10:00 AM – 2:59 PM IST
    - cron: "*/5 4-9 * * 1-5"

    # 3:00 PM – 3:30 PM IST
    - cron: "0,5,10,15,20,25,30 10 * * 1-5"


jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install yfinance
          pip install ta
          pip install requests

      - name: Run Telegram Trading Bot
        run: python telegram_bot.py
